services:
  - type: web
    name: editor-server
    env: node
    plan: free
    branch: main
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DB_HOST
    value: your_db_host
  - key: DB_USER
    value: your_db_user
  - key: DB_PASSWORD
    value: your_db_password
  - key: DB_NAME
    value: your_db_name
  - key: SESSION_SECRET
    value: your_session_secret
  - key: RAPIDAPI_KEY
    value: your_rapidapi_key
  - key: EMAIL_USER
    value: your_email
  - key: EMAIL_PASS
    value: your_email_password
  - key: BASE_CLIENT_URL
    value: your_client_url
